<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
                <img class="logo-img" src="images/logo.png" alt="The oldagram logo.">
                <img class="user-img" src="images/user-avatar.png" alt="your user-avatar">
        </header>

        <main>
            <section class="post">
                <div class="userinfo">
                    <div class="img-container">
                        <img class="user-img" src="images/avatar-vangogh.jpg">
                    </div>
                    <div class="user-text">
                        <p class="username">Vincent van Gogh</p>
                        <p class="location">Zudert, Netherlands</p>
                    </div>
                </div>
                <img class="post-img" src="images/post-vangogh.jpg" alt="a portrait of van Gogh.">
            </section>
        </main>
        <script src="index.js"></script>
    </body>
</html>
